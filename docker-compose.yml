version: "3.9"

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      - POSTGRES_DB=mydb
      - POSTGRES_USER=springuser
      - POSTGRES_PASSWORD=springpass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app-backend:
    build: .
    container_name: spring-backend-java21
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydb
      - SPRING_DATASOURCE_USERNAME=springuser
      - SPRING_DATASOURCE_PASSWORD=springpass
    depends_on:
      - postgres-db

volumes:
  postgres-data: